
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mon super site</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <!-- PROBLÈME : pas de balises sémantiques, tout est en div -->
  <header> <!--faut mettre un header-->
    <h1>Portfolio</h1><!--H1 directement-->
    <nav><!--Mettre directement un nav-->
      <ul>
        <li><a href="#projets">Projets</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main><!--Mettre un main directement-->
    <div class="content">

      <section class="intro">
        <div class="intro-titre">Bienvenue sur mon portfolio</div>
        <div class="intro-description">Étudiante en MMI, passionnée par le web.</div>
      </section>

      <section class="projets-section" id="projets">
        <div class="section-titre">Mes projets</div>

        <div class="filtres-container">
          <button class="filtre actif" onclick="filtrer('tous')">Tous</button>
          <button class="filtre" onclick="filtrer('HTML')">HTML</button>
          <button class="filtre" onclick="filtrer('CSS')">CSS</button>
          <button class="filtre" onclick="filtrer('JS')">JS</button>
        </section>

        <div class="grille-projets" id="grille">
          <!-- Rempli par JS -->
        </div>
      </div>
    </div>
  </main>

  <!-- Modale -->
  <div class="modale-overlay" id="modale">
    <div class="modale-contenu">
      <span class="modale-fermer" onclick="fermerModale()">×</span>
      <div id="modale-body"></div>
    </div>
  </div>

  <footer class="footer">
    <div>© 2026 — Mon portfolio</div>
  </footer>
  <script src="script.js"> </script>
</body>
</html>
